  executive_summary: Implementation of Loan Origination System (LOS) for Consumer
    Durables (CD) and Cross Sell Personal Loan (CSPL) products using Salesforce Experience
    Cloud. The project includes lead management, KYC processes, decisioning, underwriting,
    and integration with multiple third-party systems across branch, dealer, and digital
    channels.
